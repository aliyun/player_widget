<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>AliPlayerWidget - Flutter 播放器组件</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="AliPlayerWidget Flutter 播放器组件文档 - 低代码播放器 UI 组件与场景化解决方案">
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@latest/lib/themes/vue.css">
    <style>
        :root {
            --theme-color: #42b983;
            --theme-color-dark: #3aa876;
        }

        /* 暗黑模式 */
        body.dark-mode {
            background: #1a1a1a;
            color: #e0e0e0;
        }
        body.dark-mode .sidebar {
            background: #202020;
        }
        body.dark-mode .sidebar > h1 a {
            color: #fff;
        }
        body.dark-mode .sidebar-nav > ul > li > p {
            color: #bbb;
        }
        body.dark-mode .sidebar-nav li a {
            color: #999;
        }
        body.dark-mode .sidebar-nav li a:hover {
            color: #42b983;
        }
        body.dark-mode .sidebar-nav li.active > a {
            color: #42b983;
            border-right-color: #42b983;
        }

        /* 标题 - 强制白色 */
        body.dark-mode .markdown-section h1,
        body.dark-mode .markdown-section h2,
        body.dark-mode .markdown-section h3,
        body.dark-mode .markdown-section h4,
        body.dark-mode .markdown-section h5,
        body.dark-mode .markdown-section h6 {
            color: #ffffff !important;
        }

        body.dark-mode .markdown-section a {
            color: #5ecaa3;
        }
        body.dark-mode pre {
            background: #282c34 !important;
        }
        body.dark-mode pre code {
            color: #e0e0e0 !important;
            background: transparent !important;
            text-shadow: none !important;
        }
        /* 代码高亮关键字 */
        body.dark-mode .token.keyword,
        body.dark-mode .token.tag,
        body.dark-mode .token.selector,
        body.dark-mode .token.attr-name {
            color: #c678dd !important;
        }
        body.dark-mode .token.string,
        body.dark-mode .token.attr-value {
            color: #98c379 !important;
        }
        body.dark-mode .token.function {
            color: #61afef !important;
        }
        body.dark-mode .token.number,
        body.dark-mode .token.constant {
            color: #d19a66 !important;
        }
        body.dark-mode .token.comment {
            color: #5c6370 !important;
        }

        body.dark-mode .markdown-section code {
            background: rgba(66, 185, 131, 0.2);
            color: #5ecaa3 !important;
            text-shadow: none !important;
        }
        body.dark-mode blockquote {
            background: #252525;
            border-left-color: #42b983;
            color: #aaa;
        }
        body.dark-mode table th {
            background: #252525;
            color: #fff;
        }
        body.dark-mode table tr:nth-child(2n) {
            background: #222;
        }
        body.dark-mode table td,
        body.dark-mode table th {
            border-color: #333;
        }
        body.dark-mode .mermaid {
            filter: invert(1) hue-rotate(180deg);
        }
        body.dark-mode .docsify-pagination-container {
            border-top-color: #333;
        }
        body.dark-mode .pagination-item-label {
            color: #888;
        }
        body.dark-mode .pagination-item-label-title {
            color: #42b983;
        }

        /* 侧边栏按钮 - 垂直排列 */
        .sidebar-btns {
            padding: 10px 15px;
            border-bottom: 1px solid #eee;
            margin-bottom: 10px;
        }
        body.dark-mode .sidebar-btns {
            border-bottom-color: #333;
        }
        .sidebar-btn {
            display: block;
            cursor: pointer;
            padding: 8px 12px;
            margin-bottom: 6px;
            font-size: 13px;
            text-align: center;
            border-radius: 4px;
            background: rgba(66, 185, 131, 0.1);
            color: #42b983;
            border: 1px solid #42b983;
            transition: all 0.2s;
        }
        .sidebar-btn:last-child {
            margin-bottom: 0;
        }
        .sidebar-btn:hover {
            background: #42b983;
            color: #fff;
        }
    </style>
</head>

<body>
    <div id="app">加载中...</div>
    <script>
        // 初始化暗黑模式
        if (localStorage.getItem('theme-mode') === 'dark') {
            document.body.classList.add('dark-mode');
        }

        window.$docsify = {
            name: 'AliPlayerWidget',
            nameLink: '#/',
            repo: '',
            loadSidebar: true,
            auto2top: true,
            subMaxLevel: 3,
            pagination: {
                previousText: '上一章节',
                nextText: '下一章节',
            },
            count: {
                countable: true,
                fontsize: '0.9em',
                color: 'rgb(90,90,90)',
                language: 'chinese'
            },
            search: {
                maxAge: 86400000,
                paths: 'auto',
                placeholder: '搜索',
                noData: '没有结果',
                depth: 6
            },
            plugins: [
                function(hook, vm) {
                    hook.doneEach(function() {
                        updateSidebarButtons();
                        updateLangButton();
                    });
                }
            ]
        };

        function updateSidebarButtons() {
            const sidebar = document.querySelector('.sidebar-nav');
            if (!sidebar || document.querySelector('.sidebar-btns')) return;

            const container = document.createElement('div');
            container.className = 'sidebar-btns';

            // 暗黑模式按钮
            const darkBtn = document.createElement('div');
            darkBtn.className = 'sidebar-btn';
            darkBtn.id = 'dark-toggle';
            darkBtn.textContent = document.body.classList.contains('dark-mode') ? '🌙 暗色' : '☀️ 亮色';
            darkBtn.onclick = function() {
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                localStorage.setItem('theme-mode', isDark ? 'dark' : 'light');
                darkBtn.textContent = isDark ? '🌙 暗色' : '☀️ 亮色';
            };

            // 语言切换按钮
            const langBtn = document.createElement('div');
            langBtn.className = 'sidebar-btn';
            langBtn.id = 'lang-toggle';
            langBtn.textContent = 'English';
            langBtn.onclick = switchLang;

            container.appendChild(darkBtn);
            container.appendChild(langBtn);
            sidebar.insertBefore(container, sidebar.firstChild);
        }

        function updateLangButton() {
            const langBtn = document.getElementById('lang-toggle');
            if (!langBtn) return;

            const path = window.location.hash.replace('#/', '') || 'README.md';
            const isEnglish = path.toUpperCase().includes('-EN');
            langBtn.textContent = isEnglish ? '中文' : 'English';
        }

        function switchLang() {
            const currentPath = window.location.hash.replace('#/', '') || 'README.md';
            let newPath;

            // 判断是否是英文版本（兼容大小写）
            const isEnglish = currentPath.toUpperCase().includes('-EN');

            if (isEnglish) {
                // 英文转中文：移除 -EN 或 -en 后缀
                newPath = currentPath.replace(/-en\.md$/i, '.md');
            } else {
                // 中文转英文
                if (currentPath.toUpperCase() === 'README.MD') {
                    // README.md 特殊处理，转为 README-EN.md
                    newPath = 'README-EN.md';
                } else if (currentPath.endsWith('.md')) {
                    // 其他文件添加 -en 后缀
                    newPath = currentPath.slice(0, -3) + '-en.md';
                } else {
                    newPath = currentPath + '-en';
                }
            }

            window.location.hash = '#/' + newPath;
        }
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify@latest/lib/docsify.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-mermaid@latest/dist/docsify-mermaid.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@latest/components/prism-bash.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@latest/components/prism-dart.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@latest/components/prism-yaml.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-pagination@latest/dist/docsify-pagination.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/external-script.min.js"></script>
    <script src="//unpkg.com/docsify-count/dist/countable.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>

</html>
